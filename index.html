<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>42 Madrid — Design Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─── DESIGN TOKENS (mirrors [data-theme=dark] from your build) ─────── */
  :root {
    --surface:     #0a0a0a;
    --surface-2:   #171717;
    --surface-3:   #262626;
    --fg:          #f5f5f5;
    --fg-muted:    #a3a3a3;
    --fg-subtle:   #737373;
    --border:      #404040;
    --border-soft: #262626;
    --brand:       #f97316;
    --brand-fg:    #0a0a0a;
    --brand-soft:  rgba(249, 115, 22, 0.18);
    --brand-strong:#fb923c;
    --ok:          #22c55e;
    --warn:        #eab308;
    --err:         #ef4444;
    --info:        #3b82f6;

    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;

    --font-body: 'Manrope', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  /* ─── RESET ─────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--surface);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.4;
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #525252; }

  /* ─── SIDEBAR ───────────────────────────────────────────────────────── */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--surface-2);
    border-right: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand-mark {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .brand-mark .logo {
    font-size: 22px;
    font-weight: 800;
    color: var(--brand);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-mark .logo-sub {
    font-size: 14px;
    font-weight: 700;
    color: var(--fg);
  }
  .brand-mark .tag {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--fg-subtle);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 6px;
    border: 1px solid var(--border-soft);
    border-radius: 4px;
  }

  .panel-section {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-soft);
  }
  .panel-section h2 {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    margin-bottom: 10px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .control-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .control-inputs {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 26px;
    height: 26px;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    cursor: pointer;
    padding: 2px;
    background: var(--surface-3);
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
  .hex-input {
    width: 78px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    padding: 5px 7px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s;
  }
  .hex-input:focus { border-color: var(--brand); }

  .range-row { margin-bottom: 12px; }
  .range-row:last-child { margin-bottom: 0; }
  .range-head {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .range-head .lbl { color: var(--fg-muted); }
  .range-head .val { color: var(--brand); }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 13px;
    height: 13px;
    background: var(--brand);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--surface-2);
  }
  input[type="range"]::-moz-range-thumb {
    width: 13px;
    height: 13px;
    background: var(--brand);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--surface-2);
  }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .preset-btn {
    background: var(--surface-3);
    border: 1px solid var(--border-soft);
    color: var(--fg-muted);
    padding: 7px 8px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preset-btn:hover {
    border-color: var(--brand);
    color: var(--fg);
  }
  .preset-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .export-btn {
    margin: 14px 20px 20px;
    padding: 11px;
    background: var(--brand);
    color: var(--brand-fg);
    border: none;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: filter 0.15s;
  }
  .export-btn:hover { filter: brightness(1.1); }
  .export-btn.success { background: var(--ok); color: #052e16; }

  /* ─── MAIN PREVIEW (mirrors the dashboard) ──────────────────────────── */
  .main {
    flex: 1;
    background: var(--surface);
    overflow-x: hidden;
  }

  /* TOP NAV */
  .topnav {
    height: 56px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topnav-logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .topnav-logo .num { color: var(--brand); }
  .topnav-logo .city { color: var(--fg); }
  .topnav-links {
    display: flex;
    gap: 22px;
    flex: 1;
    overflow: hidden;
  }
  .topnav-link {
    font-size: 13px;
    color: var(--fg-muted);
    font-weight: 500;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .topnav-link:hover, .topnav-link.active { color: var(--fg); }
  .topnav-user {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .topnav-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), var(--brand-strong));
    border: 2px solid var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: var(--brand-fg);
  }
  .topnav-username {
    font-size: 13px;
    color: var(--fg);
    font-weight: 600;
  }
  .topnav-logout {
    background: transparent;
    border: none;
    color: var(--fg-muted);
    font-size: 13px;
  }
  .topnav-logout:hover { color: var(--err); }

  /* DASHBOARD GRID */
  .dashboard {
    padding: 20px;
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    gap: 16px;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 920px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* ─── PROFILE CARD ──────────────────────────────────────────────────── */
  .profile-card {
    background: var(--surface-2);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-xl);
    overflow: hidden;
    border-top: 3px solid var(--brand);
  }
  .profile-head {
    position: relative;
    padding: 20px 24px 16px;
    background:
      radial-gradient(ellipse at top left, var(--brand-soft) 0%, transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(249,115,22,0.06) 0%, transparent 70%);
  }
  .profile-row {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    position: relative;
  }
  .coalition-watermark {
    position: absolute;
    top: 6px; right: 18px;
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--brand);
    opacity: 0.22;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--brand);
  }
  .coalition-watermark::before {
    content: '';
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--brand);
  }
  .avatar-big {
    width: 80px; height: 80px;
    border-radius: var(--radius-md);
    background: var(--surface-3);
    box-shadow: 0 0 0 2px rgba(249,115,22,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: var(--brand);
    flex-shrink: 0;
    background-image: linear-gradient(135deg, var(--surface-3), var(--surface));
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-name {
    font-size: 19px;
    font-weight: 700;
    color: var(--fg);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2px;
  }
  .profile-fullname {
    font-size: 13px;
    color: var(--fg-muted);
    margin-bottom: 10px;
  }
  .badge-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 11.5px;
    font-weight: 600;
  }
  .badge-coalition {
    background: var(--brand-soft);
    color: var(--brand);
    border: 1px solid rgba(249,115,22,0.4);
  }
  .badge-coalition .sep {
    border-left: 1px solid rgba(249,115,22,0.4);
    padding-left: 6px;
    margin-left: 1px;
    font-weight: 700;
    font-family: var(--font-mono);
    font-size: 10.5px;
  }
  .badge-intra {
    background: var(--surface-3);
    color: var(--fg-muted);
    border: 1px solid var(--border-soft);
    transition: all 0.15s;
  }
  .badge-intra:hover {
    color: var(--brand);
    border-color: rgba(249,115,22,0.5);
  }

  .level-section { margin-top: 18px; }
  .level-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .level-label { color: var(--fg-muted); }
  .level-value {
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--brand);
    font-size: 14px;
  }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--surface-3);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--brand);
    border-radius: 999px;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px rgba(249,115,22,0.4);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-top: 1px solid var(--border-soft);
  }
  .stat-cell {
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid var(--border-soft);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--fg);
    font-family: var(--font-mono);
    line-height: 1.1;
    margin-bottom: 3px;
  }
  .stat-value.brand { color: var(--brand); }
  .stat-value.ok { color: var(--ok); }
  .stat-label {
    font-size: 11px;
    color: var(--fg-subtle);
    letter-spacing: 0.02em;
  }

  /* ─── CARDS (Calendar / Evaluations / Skills / Chart) ──────────────── */
  .card {
    background: var(--surface-2);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-xl);
    padding: 18px 20px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg);
  }
  .card-body { min-height: 0; }

  /* Toggle */
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-track {
    width: 32px;
    height: 18px;
    border-radius: 999px;
    background: var(--surface-3);
    border: 1px solid var(--border-soft);
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track.on { background: var(--brand); border-color: var(--brand); }
  .toggle-thumb {
    position: absolute;
    top: 1px; left: 1px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--fg-muted);
    transition: all 0.2s;
  }
  .toggle-track.on .toggle-thumb { left: 15px; background: var(--brand-fg); }
  .toggle-label { font-size: 12px; color: var(--fg-muted); }

  .ghost-btn {
    background: var(--surface-3);
    border: 1px solid var(--border-soft);
    color: var(--fg-muted);
    padding: 5px 11px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .ghost-btn:hover {
    color: var(--brand);
    border-color: rgba(249,115,22,0.5);
  }

  /* CALENDAR EVENTS */
  .events { display: flex; flex-direction: column; gap: 8px; }
  .event {
    display: flex;
    gap: 14px;
    align-items: center;
    padding: 12px;
    border-radius: var(--radius-md);
    background: var(--surface-3);
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .event:hover { border-color: rgba(249,115,22,0.3); }
  .event-date {
    text-align: center;
    flex-shrink: 0;
    width: 48px;
  }
  .event-date .dow {
    font-size: 9.5px;
    color: var(--fg-subtle);
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .event-date .day {
    font-size: 22px;
    font-weight: 700;
    color: var(--brand);
    line-height: 1;
    margin: 1px 0;
  }
  .event-date .mon {
    font-size: 9.5px;
    color: var(--fg-subtle);
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .event-body { flex: 1; min-width: 0; }
  .event-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .event-title .name {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--brand);
  }
  .event-tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 4px;
    text-transform: lowercase;
    font-weight: 600;
  }
  .event-tag.conference {
    background: rgba(59,130,246,0.15);
    color: var(--info);
    border: 1px solid rgba(59,130,246,0.3);
  }
  .event-tag.exam {
    background: rgba(239,68,68,0.15);
    color: var(--err);
    border: 1px solid rgba(239,68,68,0.3);
  }
  .event-desc {
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.45;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .event-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 11px;
    color: var(--fg-subtle);
    font-family: var(--font-mono);
  }
  .event-meta span { display: inline-flex; align-items: center; gap: 4px; }

  /* EVALUATIONS empty */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 280px;
    color: var(--fg-subtle);
    font-size: 13px;
  }

  /* ─── SKILLS RADAR ──────────────────────────────────────────────────── */
  .skills-card { display: flex; flex-direction: column; }
  .seg-control {
    display: flex;
    background: var(--surface-3);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    padding: 2px;
    font-size: 11px;
  }
  .seg-control button {
    background: transparent;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    color: var(--fg-muted);
    font-weight: 600;
    transition: all 0.15s;
  }
  .seg-control button.active {
    background: var(--brand-soft);
    color: var(--brand);
  }

  .radar-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
    min-height: 280px;
  }
  .radar-svg { width: 100%; max-width: 340px; height: auto; }

  /* ─── CHART (Evaluation History) ───────────────────────────────────── */
  .chart-card { display: flex; flex-direction: column; }
  .chart-wrap {
    flex: 1;
    width: 100%;
    min-height: 260px;
    position: relative;
  }
  .chart-svg { width: 100%; height: 260px; display: block; }

  /* FOOTER */
  .page-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border-soft);
    color: var(--fg-subtle);
    font-size: 11px;
    text-align: center;
    margin-top: 10px;
  }
  .page-footer .accent { color: var(--brand); }

  /* ─── EXPORT MODAL ──────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    width: min(560px, 100%);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-head h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg);
  }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--fg-muted);
    font-size: 18px;
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--surface-3); color: var(--fg); }
  .modal-body {
    padding: 16px 20px 20px;
    overflow-y: auto;
  }
  .css-output {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;
  }
  .css-output .k { color: var(--brand); }
  .css-output .v { color: var(--fg); }
  .css-output .c { color: var(--fg-subtle); font-style: italic; }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .modal-actions button {
    flex: 1;
    padding: 9px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 700;
    border: 1px solid var(--border-soft);
    background: var(--surface-3);
    color: var(--fg);
